<section class="section-page">
  <article class="card">
    <p class="eyebrow">{{ eyebrow }}</p>
    <h1>{{ title }}</h1>
    <p class="description">{{ description }}</p>

    <div class="action-row">
      <button type="button" class="primary-button">{{ actionLabel }}</button>
      <span class="note">{{ actionNote }}</span>
    </div>
  </article>
</section>
