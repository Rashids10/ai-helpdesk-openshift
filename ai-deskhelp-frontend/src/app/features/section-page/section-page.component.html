<section class="section-page">
  <article class="card">
    @if (eyebrow) {
      <p class="eyebrow">{{ eyebrow }}</p>
    }
    @if (showContentTitle) {
      <h1>{{ title }}</h1>
    }
    <p class="description">{{ description }}</p>

    <div class="action-row">
      <button type="button" class="primary-button">{{ actionLabel }}</button>
      @if (actionNote) {
        <span class="note">{{ actionNote }}</span>
      }
    </div>
  </article>
</section>
