name: Backend Pipeline

on:
  push:
    branches:
      - feature/setup-ci-cd
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build
        run: mvn clean install -DskipTests
