name: Backend Pipeline

on:
  # Run on feature/setup-ci-cd branch pushes and PRs to main.
  push:
    branches:
      - feature/setup-ci-cd
  pull_request:
    branches:
      - main

permissions:
  # Read-only token access.
  contents: read

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        # Execute backend commands from the backend/ directory.
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build
        # Skip tests in CI until test infrastructure is available.
        run: mvn clean install -DskipTests
