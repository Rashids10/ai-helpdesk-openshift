apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-deskhelp-ingress

spec:
  ingressClassName: nginx
  rules:
    - host: ai-deskhelp.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8082

          - path: /rag
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8082

          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8082

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8081